vich_uploader:
    db_driver: orm
    storage: file_system
    mappings:
        proposition_files:
            uri_prefix: /uploads/propositions
            upload_destination: '%kernel.project_dir%/public/uploads/propositions'
            namer: Vich\UploaderBundle\Naming\UniqidNamer
            delete_on_remove: true
            delete_on_update: true

